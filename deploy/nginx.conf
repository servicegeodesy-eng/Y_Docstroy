# ============================================================================
# DocStroy — Nginx Configuration
# Yandex Cloud Compute (Ubuntu + Nginx + PM2)
# ============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name docstroy.ru api.docstroy.ru;
    return 301 https://$host$request_uri;
}

# Frontend: docstroy.ru
server {
    listen 443 ssl http2;
    server_name docstroy.ru;

    ssl_certificate     /etc/letsencrypt/live/docstroy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docstroy.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/docstroy/dist;
    index index.html;

    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Static assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker — no cache
    location = /sw-push.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Manifest
    location = /manifest-geo.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# API: api.docstroy.ru
server {
    listen 443 ssl http2;
    server_name api.docstroy.ru;

    ssl_certificate     /etc/letsencrypt/live/docstroy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docstroy.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Gzip for API responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types application/json;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large file uploads
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
